databases:
  - name: taskdb

services:
  - type: web
    name: task-app-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskdb
          property: connectionString
      # Origem do front-end (preencher depois com a URL do Vercel).
      # Pode ter várias separadas por vírgula.
      - key: FRONTEND_URL
        value: http://localhost:5173